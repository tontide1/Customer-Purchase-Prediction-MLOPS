# Target-state scaffold for local MinIO + MLflow services.
services:
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9002}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - mlops_net

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "/init-bucket.sh"]
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-mlops-artifacts}
    volumes:
      - ./infra/minio/init-bucket.sh:/init-bucket.sh:ro
    restart: "no"
    networks:
      - mlops_net

  mlflow:
    build:
      context: .
      dockerfile: infra/mlflow/Dockerfile
    image: iuh-final-mlflow:local
    container_name: mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlflow/mlflow.db --serve-artifacts --default-artifact-root mlflow-artifacts:/ --artifacts-destination s3://${MINIO_BUCKET:-mlops-artifacts}/mlflow --allowed-hosts mlflow,mlflow:5000,localhost,127.0.0.1
    depends_on:
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:////mlflow/mlflow.db
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "5000:5000"
    volumes:
      - mlflow_backend:/mlflow
    restart: unless-stopped
    networks:
      - mlops_net

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.6
    container_name: redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
    networks:
      - mlops_net

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.6
    container_name: redpanda-init
    depends_on:
      - redpanda
    entrypoint: ["/bin/sh", "-c"]
    command: sh /infra/redpanda/init-topics.sh
    environment:
      KAFKA_BROKER: redpanda:9092
    volumes:
      - ./infra/redpanda/init-topics.sh:/infra/redpanda/init-topics.sh:ro
    restart: "no"
    networks:
      - mlops_net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - mlops_net

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlops}
      POSTGRES_DB: ${POSTGRES_DB:-mlops}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - mlops_net

  simulator:
    build:
      context: .
      dockerfile: services/simulator/Dockerfile
    image: iuh-final-simulator:local
    profiles: ["week3"]
    depends_on:
      - redpanda-init
    environment:
      KAFKA_BROKER: redpanda:9092
      RAW_EVENTS_TOPIC: raw_events
      SIMULATION_RAW_DATA_PATH: /app/data/simulation_raw/2019-Nov.csv.gz
      REPLAY_LIMIT: ${REPLAY_LIMIT:-1000}
    volumes:
      - ./data:/app/data:ro
    networks:
      - mlops_net

  stream-processor:
    build:
      context: .
      dockerfile: services/stream_processor/Dockerfile
    image: iuh-final-stream-processor:local
    depends_on:
      - redpanda-init
      - redis
      - postgres
    environment:
      KAFKA_BROKER: redpanda:9092
      RAW_EVENTS_TOPIC: raw_events
      LATE_EVENTS_TOPIC: late_events
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://mlops:mlops@postgres:5432/mlops
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-1800}
      LATE_EVENT_THRESHOLD_SECONDS: ${LATE_EVENT_THRESHOLD_SECONDS:-60}
    networks:
      - mlops_net

  prediction-api:
    build:
      context: .
      dockerfile: services/prediction_api/Dockerfile
    image: iuh-final-prediction-api:local
    depends_on:
      - redis
      - mlflow
    environment:
      API_KEY: ${API_KEY:-local-dev-api-key}
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_SERVING_BUNDLE_URI: ${MLFLOW_SERVING_BUNDLE_URI:-runs:/replace-with-week3-smoke-run}
    ports:
      - "8080:8000"
    networks:
      - mlops_net

volumes:
  minio_data:
  mlflow_backend:
  postgres_data:

networks:
  mlops_net:
    name: mlops_net
