# Week 1: Data Foundation Pipeline
# This dvc.yaml includes only stages that can be executed in Week 1.
# Week 2+ stages (session_split, gold, train, etc.) are postponed until their dependencies are ready.

stages:
  bronze:
    desc: "Transform raw CSV to bronze parquet (event_time → source_event_time)"
    cmd: python -m training.src.bronze --input data/train_raw --output data/bronze/events.parquet
    deps:
      - training/src/bronze.py
      - training/src/config.py
      - shared/constants.py
      - shared/schemas.py
      - data/train_raw
    outs:
      - data/bronze/events.parquet:
          desc: "Validated, immutable bronze artifact with source_event_time"

  silver:
    desc: "Clean, deduplicate, and sort bronze data to silver parquet"
    cmd: python -m training.src.silver --input data/bronze/events.parquet --output data/silver/events.parquet
    deps:
      - training/src/silver.py
      - training/src/config.py
      - shared/constants.py
      - shared/schemas.py
      - data/bronze/events.parquet
    outs:
      - data/silver/events.parquet:
          desc: "Clean, deduplicated, deterministically sorted data"
