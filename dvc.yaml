# Week 2 Sprint 2a: Offline Data Foundation Pipeline

stages:
  bronze:
    desc: "Transform raw CSV to bronze parquet (event_time → source_event_time)"
    cmd: python -m training.src.bronze --input data/train_raw --output data/bronze
    deps:
      - training/src/bronze.py
      - training/src/config.py
      - shared/constants.py
      - shared/schemas.py
      - data/train_raw
    outs:
      - data/bronze:
          desc: "Validated, immutable bronze parquet dataset"

  silver:
    desc: "Clean, deduplicate, and sort bronze data to silver parquet"
    cmd: python -m training.src.silver --input data/bronze --output data/silver
    deps:
      - training/src/silver.py
      - training/src/config.py
      - training/src/features.py
      - training/src/session_split.py
      - training/src/gold.py
      - shared/constants.py
      - shared/schemas.py
      - data/bronze
    outs:
      - data/silver:
          desc: "Clean, deduplicated, deterministically sorted parquet dataset"

  session_split:
    desc: "Build a deterministic session split map from silver"
    cmd: python -m training.src.session_split --input data/silver --output data/gold/session_split_map.parquet
    deps:
      - training/src/session_split.py
      - training/src/config.py
      - shared/constants.py
      - shared/schemas.py
      - data/silver
    outs:
      - data/gold/session_split_map.parquet:
          desc: "Session-level train/val/test split map"

  gold:
    desc: "Materialize per-event gold snapshots"
    cmd: python -m training.src.gold --input data/silver --split-map data/gold/session_split_map.parquet --output data/gold
    deps:
      - training/src/gold.py
      - training/src/features.py
      - training/src/config.py
      - training/src/session_split.py
      - shared/constants.py
      - shared/schemas.py
      - data/silver
      - data/gold/session_split_map.parquet
    outs:
      - data/gold/train.parquet:
          desc: "Train gold snapshots"
      - data/gold/val.parquet:
          desc: "Validation gold snapshots"
      - data/gold/test.parquet:
          desc: "Test gold snapshots"

  train:
    desc: "Train three models, select winner by validation PR-AUC, validate against production"
    cmd: python -m training.src.train --train data/gold/train.parquet --val data/gold/val.parquet --test data/gold/test.parquet --session-split-map data/gold/session_split_map.parquet
    deps:
      - training/src/train.py
      - training/src/evaluate.py
      - training/src/model_validation.py
      - training/src/explainability.py
      - training/src/data_lineage.py
      - training/src/config.py
      - shared/constants.py
      - shared/schemas.py
      - data/gold/train.parquet
      - data/gold/val.parquet
      - data/gold/test.parquet
      - data/gold/session_split_map.parquet
    outs:
      - mlruns:
          desc: "MLflow experiment tracking directory (local)"
