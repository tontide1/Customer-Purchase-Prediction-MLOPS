name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        # dev extra includes training, shared, and services/* dependencies.
        # Install only via pyproject.toml to avoid dependency skew with requirements.txt.
        run: python -m pip install -e ".[dev]"

      - name: Run pre-commit
        env:
          PRE_COMMIT_HOME: /tmp/pre-commit-cache
        run: pre-commit run --all-files

      - name: Run tests with coverage
        run: pytest training/tests services/tests -q --cov=training/src --cov=shared --cov=services --cov-report=term-missing

      - name: Validate Docker Compose graph
        run: docker compose config >/tmp/iuh-week3-compose.yml

      - name: Validate DVC pipeline graph
        run: dvc dag
